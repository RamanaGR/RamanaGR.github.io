name: Auto-merge feature_dev into main

on:
  push:
    branches:
      - feature_dev

permissions:
  contents: write

concurrency:
  group: auto-merge-main
  cancel-in-progress: false

jobs:
  merge_to_main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge feature_dev into main and push
        run: |
          set -euo pipefail

          git fetch origin main feature_dev

          # Start from the current remote main
          git checkout -B main origin/main

          # Merge in the latest feature_dev
          git merge --no-edit origin/feature_dev

          # Push back to remote main
          git push origin main
